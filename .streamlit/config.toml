[server]
# Cap user uploads to 50 MB. Default is 200 MB which is too generous
# for Streamlit Cloud free tier when combined with FFmpeg processing.
maxUploadSize = 50
# Files in ./static/ served at /app/static/<filename>. Wir nutzen
# das fuer Demo-Videos statt sie als base64 ins HTML zu inlinen.
enableStaticServing = true

[browser]
# Disable Streamlit's default usage telemetry to Snowflake. Without
# this we'd need a TDDDG cookie consent banner because the analytics
# call isn't "strictly necessary".
gatherUsageStats = false

[client]
# Hide the Streamlit hamburger menu (3-dot menu) komplett fuer End-User.
# "minimal" ist aggressiver als "viewer" - versteckt mehr Chrome-Elemente.
toolbarMode = "minimal"

[theme]
# Indigo-violet-pink brand palette, matching assets/logo.svg.
# Light theme so the gradient logo and captions stay readable.
primaryColor = "#8b5cf6"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#0f172a"
font = "sans serif"
