# Closelyst Streamlit-App fuer den VPS.
#
# Konzept: backend-caddy (Caddy-Container des pruefungscoach-Stacks)
# uebernimmt SSL + Reverse-Proxy fuer beide Domains. Dieser Stack hier
# liefert NUR den Streamlit-Container und haengt sich ins existierende
# backend_default Netzwerk ein, sodass backend-caddy ihn als
# "closelyst-app:8501" erreichen kann.
#
# Im pruefungscoach Caddyfile muss ein closelyst.com-Block stehen:
#   closelyst.com, www.closelyst.com {
#       reverse_proxy closelyst-app:8501
#   }

services:
  streamlit:
    build: .
    container_name: closelyst-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8501"
    networks:
      - backend_default
    deploy:
      resources:
        limits:
          memory: 1500M

networks:
  backend_default:
    external: true
